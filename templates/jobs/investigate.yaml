# Job template: investigate
# Open-ended investigation / root cause analysis — requires --request with a problem description.

name: investigate
description: "Root cause analysis or open-ended investigation of a problem"

request: |
  Investigate the problem described in the request. Follow these steps:
  1. Use dev-assistant to do an initial discovery pass on the repo
  2. Reproduce or trace the issue using available code, logs, or tests
  3. Identify the root cause with evidence (file paths, line numbers)
  4. Propose 1-3 potential solutions with trade-offs
  5. If a clear solution exists, implement it and create a PR
  6. Document findings in knowledge/learnings/ if reusable

# Example:
#   devcompanion queue my-api --template investigate \
#     --request "users report 500 errors on /login after the v2 merge"
